<script>
  const vp = document.getElementById('viewport');
  const img = document.getElementById('img');
  let scale = 1, tx = 0, ty = 0;
  const apply = () => img.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  const fit = () => {
    const r = vp.getBoundingClientRect();
    scale = Math.min(r.width / 5944, r.height / 3010);
    tx = (r.width - 5944 * scale) / 2;
    ty = (r.height - 3010 * scale) / 2;
    apply();
  };
  fit(); window.addEventListener('resize', fit);
  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const r = vp.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const factor = Math.exp(-e.deltaY * 0.0015);
    const ns = Math.max(0.05, Math.min(40, scale * factor));
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns; apply();
  }, {passive:false});
  let dragging = false, lx = 0, ly = 0;
  vp.addEventListener('pointerdown', e => {
    dragging = true; lx = e.clientX; ly = e.clientY;
    vp.classList.add('drag'); vp.setPointerCapture(e.pointerId);
  });
  vp.addEventListener('pointermove', e => {
    if (!dragging) return;
    tx += e.clientX - lx; ty += e.clientY - ly;
    lx = e.clientX; ly = e.clientY; apply();
  });
  vp.addEventListener('pointerup', e => { dragging = false; vp.classList.remove('drag'); });
</script></body></html>
